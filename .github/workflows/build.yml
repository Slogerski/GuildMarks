name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  minecraft-1-21-8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew clean remapJar --console=plain
      - uses: actions/upload-artifact@v4
        with:
          name: GuildMark-1.21.8
          path: build/libs/GuildMark-1.21.8-*.jar
          if-no-files-found: error

  minecraft-26-1-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew -p versions/26.1.2 clean jar --console=plain
      - uses: actions/upload-artifact@v4
        with:
          name: GuildMark-26.1.2
          path: versions/26.1.2/build/libs/GuildMark-26.1.2-*.jar
          if-no-files-found: error
