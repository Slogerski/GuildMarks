server {
    listen 80;
    listen [::]:80;
    server_name capes.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name capes.example.com;

    ssl_certificate /etc/letsencrypt/live/capes.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/capes.example.com/privkey.pem;

    access_log off;
    error_log /var/log/nginx/guildmarks-error.log warn;
    client_max_body_size 16k;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_read_timeout 20s;
    }
}
